<script  type="text/JavaScript"  >
  $(document).ready(function() {
      let origShown  = true;
      let errors = '';
      let cnt =0;
      $('.test-error').each(function() {
	  let name = $(this).attr('name');
	  let c = HU.href('#'+ name,name);
	  let url = $(this).attr('url');
	  c+='  - ' +HU.href(url,'link');
	  c+=HU.tag(TAG_PRE,[ATTR_CLASS,'test-error2'], $(this).html());
	  errors+=c;
	  cnt++;
      });
      if(cnt) {
	  jqid('header1').append(HU.toggleBlock(cnt+' errors',errors,true));
	  $('.entry-toggleblock-label').button();
      }
      jqid('buttonheader').append('Toggle Original').button().click(()=>{
	  origShown=!origShown;
	  if(origShown) {
	      $('.original-image').show();
	  } else {
	      $('.original-image').hide();
	  }
      });
      let html = SPACE;
      let w = 400;
      html+=HU.span([ATTR_CLASS,HU.classes('test-smaller',CLASS_CLICKABLE)],'Smaller');
      html+=SPACE1;
      html+=HU.span([ATTR_CLASS,HU.classes('test-bigger',CLASS_CLICKABLE)],'Bigger');
      $('h2').append(html);
      let apply = () =>{
	  $('.test-gridbox').css('width',HU.px(w));
	  $('.test-gridbox').css('max-width',HU.px(w));	  
      }
      $('.test-bigger').click(()=>{
	  w+=200;
	  apply();
      });
      $('.test-smaller').click(()=>{
	  w-=200;
	  if(w<100) w=100;
	  apply();
      });      
  });
</script>
